<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background: black; color: white; font-family: sans-serif; }
        /* The Close Button */
        #close-btn {
            position: fixed; top: 10px; right: 10px; z-index: 9999;
            background: rgba(255,255,255,0.2); color: white;
            padding: 10px 15px; border-radius: 5px; border: 1px solid white;
            display: none; /* Hidden for the first 5 seconds */
        }
    </style>
</head>
<body>
    <div id="close-btn" onclick="window.location.href='close://'">X Close</div>
    
    <script>
        // Show the close button after 5 seconds so they aren't stuck
        setTimeout(() => {
            document.getElementById('close-btn').style.display = 'block';
        }, 5000);
    </script>
</body>
</html>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3940256099942544"
            crossorigin="anonymous"></script>
    <style>
        html, body {
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            overflow: hidden; background: #000000; color: white;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-family: sans-serif;
        }
        #status-msg { margin-bottom: 10px; font-size: 14px; color: #888; }
        .ad-container { position: relative; width: 100%; height: 100%; }
        .ad-slot {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 1s ease-in-out;
        }
        .ad-slot.active { opacity: 1; }
    </style>
</head>
<body>
    <div id="status-msg">Ad playing... reward in 30 seconds</div>
    
    <div id="ad-container">
        <div id="ad1" class="ad-slot active">
            <ins class="adsbygoogle"
                 style="display:block"
                 data-ad-client="ca-pub-3940256099942544"
                 data-ad-slot="6300978111"
                 data-ad-format="auto"
                 data-full-width-responsive="true"></ins>
        </div>
        <div id="ad2" class="ad-slot">
            <ins class="adsbygoogle"
                 style="display:block"
                 data-ad-client="ca-pub-3940256099942544"
                 data-ad-slot="6300978111"
                 data-ad-format="auto"
                 data-full-width-responsive="true"></ins>
        </div>
    </div>

    <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
        (adsbygoogle = window.adsbygoogle || []).push({});

        const slots = ['ad1', 'ad2'];
        let current = 0;
        setInterval(() => {
            document.getElementById(slots[current]).classList.remove('active');
            current = (current + 1) % slots.length;
            document.getElementById(slots[current]).classList.add('active');
        }, 10000);
    </script>
</body>
</html>
