<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="Arguably App - Think you can take on the challenge?" />
    <meta name="author" content="Arguably" />
    <title>Arguably</title>
    
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"/>

    <style>
        @font-face {
            font-family: 'Prompt';
            src: url('fonts/Prompt-SemiBold.ttf') format('truetype');
        }

        body {
            background-color: #ffffff; /* White Background */
            color: #7F86EA; /* Brand Purple Text */
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: 'Prompt', sans-serif;
        }

        main {
            flex: 1;
        }

        h1 {
            font-family: 'Prompt', sans-serif;
            color: #7F86EA; /* Brand Purple */
            font-weight: 700;
        }

        .lead {
            color: #555555; /* Slightly darker grey for readability on white */
        }

        .header-bg {
            background-color: #ffffff;
        }

        /* Styling for your iPhone screenshot */
        .iphone-screenshot {
            max-width: 320px; /* Standard portrait width */
            height: auto;
            /* Optional: adds a soft purple glow/shadow to the phone */
            filter: drop-shadow(0 15px 30px rgba(127, 134, 234, 0.15));
        }

        .footer-custom {
            background-color: #212529; /* Keeping the dark footer for professional anchor */
        }

        /* Adjust badges for white background */
        .store-badge {
            height: 50px;
            transition: transform 0.2s;
        }
        .store-badge:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <main>
        <header class="py-5 header-bg">
            <div class="container px-5">
                <div class="row gx-5 align-items-center justify-content-center">
                    <div class="col-lg-8 col-xl-7 col-xxl-6">
                        <div class="my-5 text-center text-xl-start">
                            <h1 class="display-5 fw-bolder mb-2">Think you can take on the challenge?</h1>
                            <p class="lead fw-normal mb-4">Available soon on these platforms.</p>
                            <div class="d-grid gap-3 d-sm-flex justify-content-sm-center justify-content-xl-start">
                                <a href="#"><img src="https://developer.apple.com/assets/elements/badges/download-on-the-app-store.svg" alt="Download on the App Store" class="store-badge"></a>
                                <a href="#"><img src="https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg" alt="Get it on Google Play" class="store-badge"></a>
                            </div>
                        </div>
                    </div>
                    <div class="col-xl-5 col-xxl-6 d-none d-xl-block text-center">
                        <img class="rounded-3 my-5" src="/images/logoid2.png" alt="Arguably App Splash Screen" />
                    </div>
                </div>
            </div>
        </header>
    </main>

    <footer class="footer-custom py-4 mt-auto">
        <div class="container px-5">
            <div class="row align-items-center justify-content-between flex-column flex-sm-row">
                <div class="col-auto">
                    <div class="small m-0 text-white">Copyright &copy; PocketEngineStudio LLC 2026</div>
                </div>
                <div class="col-auto">
                    <a class="link-light small" href="privacy.html">Privacy Policy</a>
                    <span class="text-white mx-1">&middot;</span>
                    <a class="link-light small" href="terms.html">Terms of Service</a>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
