<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="Arguably App - Think you can take on the challenge?" />
    <meta name="author" content="Arguably" />
    <title>Arguably</title>
    
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"/>

    <style>
        @font-face {
            font-family: 'Prompt';
            src: url('fonts/Prompt-SemiBold.ttf') format('truetype');
        }

        body {
            background-color: #ffffff; 
            color: #6A5ACD; 
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: 'Prompt', sans-serif;
            font-weight: 400;
        }

        main {
            flex: 1;
            /* Added flex to center the content vertically between the nav and footer */
            display: flex;
            align-items: center; 
        }

        h1 {
            font-family: 'Prompt', sans-serif;
            color: #6A5ACD; 
            font-weight: 500;
        }

        .lead {
            color: #555555; 
        }

        .header-bg {
            background-color: #ffffff;
            width: 100%; /* Ensures it spans the width */
        }

        /* 1. Added a smooth floating animation for the image */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
            100% { transform: translateY(0px); }
        }

        .iphone-screenshot {
            max-width: 320px; 
            height: auto;
            filter: drop-shadow(0 15px 30px rgba(127, 134, 234, 0.15));
            /* Applies the animation */
            animation: float 4s ease-in-out infinite;
        }

        .footer-custom {
            background-color: #212529; 
        }

        .store-badge {
            height: 50px;
            transition: transform 0.2s;
        }
        .store-badge:hover {
            transform: scale(1.05);
        }
        * PASTE IT HERE: */
        .nav-link, .link-light, .small {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif !important;
            font-weight: 400 !important;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark py-3">
        <div class="container px-5">
            <a class="navbar-brand text-white fs-4" href="#!" style="font-family: 'Prompt', sans-serif; font-weight: 500;">
                Arguably
            </a>
            <li class="nav-item">
                <a class="nav-link" href="mailto:support@arguably.com">Contact Support</a>
            </li>
        </div>
    </nav>

    <main>
        <header class="py-5 header-bg w-100">
            <div class="container px-5">
                <div class="row gx-5 align-items-center justify-content-center">
                    <div class="col-lg-8 col-xl-7 col-xxl-6">
                        <div class="my-5 text-center text-xl-start">
                            <h1 class="display-5 mb-2" style="font-weight: normal;">Think you can take on the challenge?</h1>
                            <p class="lead fw-normal mb-4">The ultimate debate platform. Available soon on iOS and Android</p>
                            <div class="d-grid gap-3 d-sm-flex justify-content-sm-center justify-content-xl-start">
                                <a href="#"><img src="https://developer.apple.com/assets/elements/badges/download-on-the-app-store.svg" alt="Download on the App Store" class="store-badge"></a>
                                <a href="#"><img src="https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg" alt="Get it on Google Play" class="store-badge"></a>
                            </div>
                        </div>
                    </div>
                    <div class="col-xl-5 col-xxl-6 d-none d-xl-block text-center">
                        <img class="iphone-screenshot" src="images/logoid2.png" alt="Arguably App Splash Screen" />
                    </div>
                </div>
            </div>
        </header>
    </main>

    <footer class="bg-dark py-4 mt-auto">
        <div class="container px-5">
            <div class="row align-items-center justify-content-between flex-column flex-sm-row">
                <div class="col-auto">
                    <div class="small m-0 text-white">Copyright &copy; PocketEngineStudio LLC 2025</div>
                </div>
                <div class="col-auto">
                    <a class="link-light small" href="privacy.html">Privacy Policy</a>
                    <span class="text-white mx-1">&middot;</span>
                    <a class="link-light small" href="terms.html">Terms of Service</a>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
